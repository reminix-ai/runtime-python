[project]
name = "reminix-openai"
version = "0.1.0"
description = "Reminix adapter for OpenAI Agents"
readme = "README.md"
license = "Apache-2.0"
requires-python = ">=3.10"
dependencies = [
    "reminix-runtime>=0.1.0",
    "openai>=2.15.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/reminix_openai"]

[tool.uv.sources]
reminix-runtime = { workspace = true }
