name: 🚀 Publish to PyPI

on:
  release:
    types: [published]

jobs:
  check:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages --all-extras

      - name: Check formatting
        run: uv run ruff format --check .

      - name: Lint
        run: uv run ruff check .

      - name: Type check
        run: uv run pyright

      - name: Run tests
        run: uv run pytest

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-packages --all-extras

      - name: Verify tag matches runtime version
        run: uv run check-tag-version

      - name: Publish packages
        # uv publish builds and publishes in one command, but we need to loop since
        # uv doesn't have a workspace-level publish command yet
        run: |
          ROOT="$GITHUB_WORKSPACE"
          for package in packages/*/; do
            if [ -f "$package/pyproject.toml" ]; then
              # Skip if it's the monorepo package (shouldn't be in packages/, but double-check)
              if ! grep -q 'name = "reminix-runtime-monorepo"' "$package/pyproject.toml" 2>/dev/null; then
                echo "Publishing $package"
                cd "$package"
                rm -rf "$ROOT/dist"
                uv build --sdist --wheel
                uv publish --token ${{ secrets.PYPI_TOKEN }} "$ROOT"/dist/*
                cd ../..
              fi
            fi
          done

      - name: Add Package Links to Summary
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "## 📦 Published to PyPI" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** $VERSION" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Packages" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          for pkg in packages/*/pyproject.toml; do
            if [ -f "$pkg" ]; then
              NAME=$(python -c "import tomllib; f=open('$pkg','rb'); data=tomllib.load(f); print(data['project']['name']); f.close()")
              if [ "$NAME" != "reminix-runtime-monorepo" ]; then
                echo "- [\`$NAME==$VERSION\`](https://pypi.org/project/$NAME/$VERSION/)" >> $GITHUB_STEP_SUMMARY
              fi
            fi
          done
